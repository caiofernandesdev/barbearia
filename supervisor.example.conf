[program:barbearia-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/barbearia/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/barbearia-worker.log
stopwaitsecs=3600

; Após instalar:
;   sudo supervisorctl reread
;   sudo supervisorctl update
;   sudo supervisorctl start barbearia-worker:*
